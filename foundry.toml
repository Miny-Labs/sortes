[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
auto_detect_solc = false
optimizer = true
optimizer_runs = 200
via_ir = true
# SKALE Base mainnet/sepolia are Base-derived and support cancun (since Mar 2024).
# The older istanbul-only requirement applies to the legacy BITE V2 Sandbox chain only.
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@skalenetwork/bite-solidity/=lib/bite-solidity/contracts/",
    "@skalenetwork/confidential-token/=lib/confidential-token/contracts/",
    "forge-std/=lib/forge-std/src/",
    "ctf/=lib/conditional-tokens-contracts/contracts/",
    "ctf-exchange/=lib/ctf-exchange/src/",
    "uma-ctf-adapter/=lib/uma-ctf-adapter/src/",
]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fuzz]
runs = 1000

# We avoid compiling vendored CTF (0.5.x) and CTFExchange (0.8.15) inside this Foundry project.
# CTF is deployed once from its own upstream toolchain (Hardhat, solc 0.5.17) and we reference its address.
# Our own src/ stays at 0.8.24, talks to CTF via IConditionalTokens interface.

[rpc_endpoints]
skale_base_sepolia = "${SKALE_BASE_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
skale_base_sepolia = { key = "verifyme", url = "https://base-sepolia-testnet-explorer.skalenodes.com/api", chain = 324705682 }
